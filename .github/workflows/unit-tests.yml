name: Run Unit Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/Tag/SHA to test'
        required: true
  pull_request:
  push:

jobs:
  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (push/pull request)
        uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'

      - name: Checkout (workflow_dispatch)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
        if: github.event_name == 'workflow_dispatch'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python agent tests
        run: python3 -m pytest test/agent/ -v

      - name: Lint (ESLint)
        run: npx eslint server/managers/ server/controllers/ server/utils/ --max-warnings=100 || true

      - name: Lint (Ruff)
        run: |
          pip install ruff
          ruff check agent/
