name: Integration Test

on:
  pull_request:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - client/**
      - client-v3/**
      - server/**
      - test/**
      - index.js
      - package.json

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: get client dependencies
        working-directory: client
        run: npm ci

      - name: build client
        working-directory: client
        run: npm run generate

      - name: get Vue 3 client dependencies
        working-directory: client-v3
        run: npm ci

      - name: build Vue 3 client
        working-directory: client-v3
        run: npm run generate

      - name: get server dependencies
        run: npm ci --only=production

      - name: download nusqlite3
        run: |
          mkdir -p vendor
          curl -L -o vendor/libnusqlite3.zip "https://github.com/mikiher/nunicode-binaries/releases/download/v1.2/libnusqlite3-linux-x64.zip"
          sudo mkdir -p /usr/local/lib/nusqlite3
          sudo unzip vendor/libnusqlite3.zip -d /usr/local/lib/nusqlite3

      - name: run unit tests
        run: npm test

      - name: run server
        run: |
          node index.js &
          sleep 5
        env:
          PORT: 3333
          CONFIG_PATH: /tmp/abs-config
          METADATA_PATH: /tmp/abs-metadata

      - name: test if server is available
        run: curl -sf http://127.0.0.1:3333 | grep Audiobookshelf

      - name: test API responds
        run: |
          curl -sf http://127.0.0.1:3333/status | grep isInit
          curl -sf http://127.0.0.1:3333/api/fts/status || true
          curl -sf http://127.0.0.1:3333/api/ai/status || true
